<!doctype html>
<meta charset="utf-8">
<title>quant harness</title>
<body style="background:#10142a;color:#cdd6f5;font:12px monospace">
<div id="log">quant harness ready</div>
<script>
// ART_PAL 16 (src/art/palette.cjs와 동일 — 드리프트 시 이 하네스만 갱신)
const PAL_HEX = ["#f2ead8","#cfc5ac","#20222b","#4a4f5e","#d84b40","#8e2f28","#e8b03c","#96601e","#58c85c","#9b6fd4","#46c0d8","#e07830","#10142a","#35406e","#ffffff","#6f8fd2"];
const PAL = PAL_HEX.map(h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]);
window.cardQ = {};   // key "s-r" → quantized canvas (시트 조립용 페이지 상태)

window.quantize = async function(dataUrl, key, w, h){
  const img = new Image(); img.src = dataUrl; await img.decode();
  const c = document.createElement("canvas"); c.width = w; c.height = h;
  const x = c.getContext("2d");
  x.imageSmoothingEnabled = true; x.imageSmoothingQuality = "high";   // 다운스케일 = 면적 평균 → 양자화가 다시 크리스프하게 스냅
  x.drawImage(img, 0, 0, w, h);
  const d = x.getImageData(0, 0, w, h), a = d.data;
  for (let i = 0; i < a.length; i += 4) {
    let best = 0, bd = 1e9;
    for (let p = 0; p < PAL.length; p++) {
      const dr = a[i]-PAL[p][0], dg = a[i+1]-PAL[p][1], db = a[i+2]-PAL[p][2];
      const dist = dr*dr*2 + dg*dg*4 + db*db;   // 눈 민감도 가중(G>R>B)
      if (dist < bd) { bd = dist; best = p; }
    }
    a[i] = PAL[best][0]; a[i+1] = PAL[best][1]; a[i+2] = PAL[best][2]; a[i+3] = 255;
  }
  x.putImageData(d, 0, 0);
  window.cardQ[key] = c;
  document.getElementById("log").textContent = "quantized: " + Object.keys(window.cardQ).length;
  return c.toDataURL("image/png");
};

// 32장 모두 quantize 후 호출 — 8열(rank 1..8) × 4행(suit 0..3) 시트
window.assembleSheet = function(w, h){
  const c = document.createElement("canvas"); c.width = w*8; c.height = h*4;
  const x = c.getContext("2d");
  for (let s = 0; s < 4; s++) for (let r = 1; r <= 8; r++) {
    const q = window.cardQ[s + "-" + r];
    if (!q) return "MISSING:" + s + "-" + r;
    x.drawImage(q, (r-1)*w, s*h);
  }
  return c.toDataURL("image/png");
};
</script>
</body>
